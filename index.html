<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forward English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:rgba(28,28,32,.88);--card:#1a1a20;--border:rgba(255,255,255,.07);
  --text:#f0f0f3;--text-dim:#8a8a9a;--accent:#5a9cf5;--accent-glow:#7cb8ff;
  --red:#f44336;--green:#4caf50;--yellow:#ffb300;--orange:#ff7043;
  --radius:14px;--poster-w:155px;
  --glass:rgba(30,30,38,.72);--glass-border:rgba(255,255,255,.06);
}
html{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;-webkit-font-smoothing:antialiased}
body{min-height:100vh;overflow-x:hidden}
a{color:var(--accent-glow);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;gap:18px;padding:16px 36px;background:rgba(13,13,13,.45);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);transition:background .3s}
.nav-brand{font-size:1.25rem;font-weight:700;letter-spacing:-.3px;color:#fff;white-space:nowrap}
.nav-search{flex:1;max-width:400px;position:relative}
.nav-search input{width:100%;padding:10px 14px 10px 40px;border-radius:12px;border:1px solid var(--glass-border);background:rgba(255,255,255,.06);color:var(--text);font-size:.88rem;outline:none;transition:all .25s;backdrop-filter:blur(8px)}
.nav-search input:focus{border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.1)}
.nav-search input::placeholder{color:var(--text-dim)}
.nav-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text-dim)}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.nav-btn{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.nav-btn:hover{background:rgba(255,255,255,.08)}
.nav-btn svg{width:20px;height:20px;stroke:var(--text-dim)}
.search-mode-toggle{font-size:.72rem;padding:6px 12px;border-radius:20px;border:1px solid var(--glass-border);background:rgba(255,255,255,.05);color:var(--text-dim);transition:all .25s;white-space:nowrap;font-weight:600;letter-spacing:.3px}
.search-mode-toggle.active{border-color:var(--accent);color:var(--accent-glow);background:rgba(90,156,245,.12)}

/* ── SETUP ── */
.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center;gap:24px}
.setup h1{font-size:2.6rem;font-weight:800;color:#fff;letter-spacing:-.5px}
.setup p{max-width:460px;color:var(--text-dim);line-height:1.7;font-size:.92rem}
.setup-input{display:flex;gap:10px;width:100%;max-width:460px}
.setup-input input{flex:1;padding:14px 18px;border-radius:24px;border:1px solid var(--glass-border);background:rgba(255,255,255,.06);color:var(--text);font-size:.95rem;outline:none;transition:border .2s}
.setup-input input:focus{border-color:rgba(255,255,255,.2)}
.btn-primary{padding:14px 28px;border-radius:24px;background:var(--accent);color:#fff;font-weight:600;font-size:.92rem;transition:all .25s;box-shadow:0 4px 16px rgba(90,156,245,.25)}
.btn-primary:hover{opacity:.9;box-shadow:0 4px 24px rgba(90,156,245,.35)}

/* ── MAIN ── */
.main{padding-top:0}

/* ── HERO CAROUSEL ── */
.hero{position:relative;width:100%;height:80vh;min-height:440px;max-height:720px;overflow:hidden;margin-bottom:0}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease;z-index:0}
.hero-slide.active{opacity:1;z-index:1}
.hero-slide.active .hero-slide-bg{animation:kenBurns 14s ease-out forwards}
@keyframes kenBurns{from{transform:scale(1)}to{transform:scale(1.06)}}
.hero-slide-bg{width:100%;height:100%;object-fit:cover;display:block;transform-origin:center}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(180deg,rgba(13,13,13,.1) 0%,rgba(13,13,13,.3) 40%,rgba(13,13,13,.85) 75%,rgba(13,13,13,1) 100%)}
.hero-content{position:absolute;bottom:56px;left:36px;right:36px;z-index:2;max-width:560px}
.hero-title{font-size:2.4rem;font-weight:800;line-height:1.1;margin-bottom:10px;letter-spacing:-.5px;text-shadow:0 2px 20px rgba(0,0,0,.6)}
.hero-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:.8rem;color:rgba(255,255,255,.6);margin-bottom:12px;font-weight:400}
.hero-meta span{display:flex;align-items:center;gap:3px}
.hero-meta .hero-rating{font-weight:600;color:var(--green)}
.hero-desc{font-size:.86rem;line-height:1.65;color:rgba(255,255,255,.5);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:18px;font-weight:300}
.hero-actions{display:flex;gap:10px}
.hero-btn{padding:12px 26px;border-radius:24px;font-weight:600;font-size:.86rem;display:flex;align-items:center;gap:8px;transition:all .25s;border:none;cursor:pointer;backdrop-filter:blur(12px)}
.hero-btn-primary{background:rgba(255,255,255,.95);color:#111}
.hero-btn-primary:hover{background:#fff;box-shadow:0 4px 20px rgba(255,255,255,.15)}
.hero-btn-primary svg{fill:#111}
.hero-btn-secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}
.hero-btn-secondary:hover{background:rgba(255,255,255,.18)}
.hero-btn svg{width:16px;height:16px;fill:#fff}
.hero-dots{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:3;display:flex;gap:5px}
.hero-dot{width:7px;height:7px;border-radius:4px;background:rgba(255,255,255,.3);cursor:pointer;transition:all .4s;border:none}
.hero-dot.active{width:22px;background:rgba(255,255,255,.9)}
.hero-progress{position:absolute;bottom:0;left:0;height:2px;background:rgba(255,255,255,.3);z-index:3;transition:width .1s linear}

/* ── ROW ── */
.row{padding:16px 0 4px}
.row-header{display:flex;align-items:center;padding:0 36px 10px;gap:8px;cursor:default}
.row-title{font-size:1.05rem;font-weight:600;letter-spacing:-.2px}
.row-chevron{color:var(--text-dim);font-size:1rem;margin-left:2px;font-weight:300}
.row-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 36px 14px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;align-items:flex-start}
.row-scroll::-webkit-scrollbar{height:0;display:none}

/* ── CARD ── */
.card{flex:0 0 var(--poster-w);cursor:pointer;transition:transform .3s cubic-bezier(.22,1,.36,1),box-shadow .3s;position:relative;overflow:visible}
.card:hover{transform:translateY(-6px);z-index:2}
.card-poster{border-radius:var(--radius);overflow:hidden;position:relative;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.card:hover .card-poster{box-shadow:0 12px 36px rgba(0,0,0,.55)}
.card-img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--card)}
.card-no-img{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:var(--card);color:var(--text-dim);font-size:.72rem;text-align:center;padding:8px;border-radius:var(--radius)}
.card-info{padding:7px 2px 0;height:38px;overflow:hidden}
.card-title{font-size:.76rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);line-height:1.3}
.card-meta{font-size:.64rem;color:var(--text-dim);margin-top:1px;display:flex;gap:6px;align-items:center;height:16px}
.card-rating{display:inline-flex;align-items:center;gap:2px;font-weight:600;font-size:.64rem}
.rating-high{color:var(--green)}
.rating-mid{color:var(--yellow)}
.rating-low{color:var(--red)}
.card-badge{position:absolute;top:8px;right:8px;padding:2px 7px;border-radius:6px;font-size:.58rem;font-weight:700;background:rgba(0,0,0,.55);color:rgba(255,255,255,.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1)}
.card-lang{position:absolute;top:8px;left:8px;padding:2px 6px;border-radius:6px;font-size:.56rem;font-weight:800;letter-spacing:.5px;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12)}
.card-lang-es{background:rgba(205,50,50,.6);color:#fff}
.card-lang-ja{background:rgba(80,80,200,.6);color:#fff}
.card-lang-ko{background:rgba(60,140,180,.6);color:#fff}
.cw-card{flex:0 0 280px;border-radius:14px;overflow:hidden;cursor:pointer;background:var(--card);transition:transform .25s,box-shadow .25s;position:relative}
.cw-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.5)}
.cw-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#1a1a1a}
.cw-info{padding:10px 12px 12px;position:relative}
.cw-title{font-size:.78rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cw-sub{font-size:.65rem;color:var(--text-dim);margin-top:2px;display:flex;gap:6px;align-items:center}
.cw-ep{color:var(--accent-glow);font-weight:600}
.cw-progress{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.08)}
.cw-progress-bar{height:100%;background:var(--accent);border-radius:0 2px 2px 0;transition:width .3s}
.cw-play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;backdrop-filter:blur(6px)}
.cw-card:hover .cw-play-icon{opacity:1}
.cw-play-icon svg{width:18px;height:18px;fill:#fff;margin-left:2px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:flex-start;justify-content:center;padding:30px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:20px;max-width:860px;width:100%;overflow:hidden;animation:modalIn .4s cubic-bezier(.22,1,.36,1);box-shadow:0 24px 80px rgba(0,0,0,.6)}
@keyframes modalIn{from{opacity:0;transform:translateY(32px) scale(.97)}to{opacity:1;transform:none}}
.modal-backdrop{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--card)}
.modal-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;z-index:3;transition:background .2s;border:1px solid rgba(255,255,255,.08)}
.modal-close:hover{background:rgba(0,0,0,.7)}
.modal-body{padding:28px 32px 32px;position:relative}
.modal-title{font-size:1.6rem;font-weight:700;margin-bottom:4px;text-align:center;letter-spacing:-.3px}
.modal-tagline{font-size:.82rem;color:var(--text-dim);font-style:italic;margin-bottom:14px;text-align:center}
.modal-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin-bottom:16px;font-size:.82rem;color:var(--text-dim)}
.modal-meta .rating{font-weight:600}
.modal-genres{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;justify-content:center}
.genre-tag{padding:4px 14px;border-radius:20px;font-size:.72rem;font-weight:500;background:rgba(255,255,255,.06);color:var(--text-dim);border:1px solid rgba(255,255,255,.08)}
.modal-overview{font-size:.88rem;line-height:1.75;color:var(--text-dim);margin-bottom:22px;font-weight:300}
.modal-cast-title{font-size:.88rem;font-weight:600;margin-bottom:10px;color:var(--text-dim);letter-spacing:.3px;text-transform:uppercase;font-size:.72rem}
.modal-cast{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px}
.modal-cast::-webkit-scrollbar{display:none}
.cast-card{flex:0 0 72px;text-align:center}
.cast-img{width:56px;height:56px;border-radius:50%;object-fit:cover;background:var(--card);margin:0 auto 6px;border:2px solid rgba(255,255,255,.06)}
.cast-name{font-size:.65rem;line-height:1.3;font-weight:500}
.cast-char{font-size:.58rem;color:var(--text-dim);line-height:1.3;font-weight:300}

/* ── TRAILER ── */
.trailer-container{position:relative;width:100%;aspect-ratio:16/9;background:#000;margin-bottom:0}
.trailer-container iframe{width:100%;height:100%;border:none}
.trailer-toggle{position:absolute;bottom:14px;left:14px;padding:8px 16px;border-radius:20px;background:rgba(0,0,0,.6);color:#fff;font-size:.75rem;font-weight:500;z-index:2;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);transition:all .2s}
.trailer-toggle:hover{background:rgba(0,0,0,.8)}

/* ── ACTIONS BAR ── */
.modal-actions{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.btn-watch{flex:1;padding:14px 24px;border-radius:28px;background:#fff;color:#111;font-weight:600;font-size:.92rem;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .25s;box-shadow:0 2px 12px rgba(255,255,255,.08)}
.btn-watch:hover{box-shadow:0 4px 20px rgba(255,255,255,.15)}
.btn-watch svg{width:18px;height:18px;fill:#111}
.btn-trailer{padding:14px 20px;border-radius:28px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--text-dim);font-size:.82rem;display:flex;align-items:center;gap:6px;transition:all .25s;backdrop-filter:blur(6px)}
.btn-trailer:hover{background:rgba(255,255,255,.1);color:var(--text)}

/* ── EPISODE PICKER ── */
.episode-picker{margin-bottom:22px;display:none}
.episode-picker.visible{display:block}
.season-select{padding:10px 16px;border-radius:12px;border:1px solid var(--glass-border);background:rgba(255,255,255,.06);color:var(--text);font-size:.84rem;outline:none;margin-bottom:12px;cursor:pointer;transition:border .2s}
.season-select:focus{border-color:rgba(255,255,255,.2)}
.episode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:6px}
.ep-btn{padding:9px 4px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--glass-border);color:var(--text-dim);font-size:.78rem;text-align:center;transition:all .2s;cursor:pointer;font-weight:500}
.ep-btn:hover{border-color:rgba(255,255,255,.18);color:var(--text);background:rgba(255,255,255,.08)}
.ep-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.ep-name{font-size:.72rem;color:var(--text-dim);margin-top:10px;min-height:1.3em}

/* ── SOURCE PANEL ── */
.source-panel{margin-bottom:22px;display:none}
.source-panel.visible{display:block}
.source-loading{text-align:center;color:var(--text-dim);padding:18px;font-size:.84rem}
.quality-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.quality-tab{padding:8px 18px;border-radius:20px;font-size:.76rem;font-weight:600;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text-dim);cursor:pointer;transition:all .2s}
.quality-tab:hover{background:rgba(255,255,255,.08);color:var(--text)}
.quality-tab.active{background:#fff;color:#111;border-color:#fff}
.quality-tab.q-4k.active{background:#f44336;color:#fff;border-color:#f44336}
.quality-tab.q-1080p.active{background:#4caf50;color:#fff;border-color:#4caf50}
.quality-tab.q-720p.active{background:#ffb300;color:#111;border-color:#ffb300}
.source-card{background:rgba(255,255,255,.04);border:1px solid var(--glass-border);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.source-card:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12)}
.source-card-title{font-size:.8rem;font-weight:500;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-card-meta{font-size:.7rem;color:var(--text-dim);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.source-card-badge{font-size:.65rem;font-weight:700;color:var(--accent-glow)}
.source-card-play{margin-left:auto;color:var(--green);font-weight:600;font-size:.7rem;flex-shrink:0}
.no-sources{text-align:center;padding:24px;color:var(--text-dim);font-size:.84rem}
.quality-group{margin-bottom:8px;border:1px solid var(--glass-border);border-radius:var(--radius);overflow:hidden}
.quality-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.03);cursor:pointer;transition:background .2s;width:100%;text-align:left}
.quality-header:hover{background:rgba(255,255,255,.06)}
.quality-badge{padding:4px 12px;border-radius:8px;font-size:.7rem;font-weight:700;min-width:52px;text-align:center}
.quality-badge.q-4k{background:rgba(244,67,54,.15);color:#f44336;border:1px solid rgba(244,67,54,.2)}
.quality-badge.q-1080p{background:rgba(76,175,80,.15);color:#4caf50;border:1px solid rgba(76,175,80,.2)}
.quality-badge.q-720p{background:rgba(255,179,0,.15);color:#ffb300;border:1px solid rgba(255,179,0,.2)}
.quality-badge.q-480p{background:rgba(138,138,154,.15);color:#8a8a9a;border:1px solid rgba(138,138,154,.15)}
.quality-badge.q-other{background:rgba(138,138,154,.1);color:#8a8a9a;border:1px solid rgba(138,138,154,.1)}
.quality-primary-title{flex:1;font-size:.76rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quality-play{padding:6px 14px;border-radius:20px;background:var(--accent);color:#fff;font-size:.7rem;font-weight:600;white-space:nowrap;transition:all .2s}
.quality-play:hover{opacity:.85}
.quality-count{font-size:.66rem;color:var(--text-dim);white-space:nowrap}
.quality-expand{font-size:.78rem;color:var(--text-dim);transition:transform .2s;margin-left:4px}
.quality-expand.expanded{transform:rotate(180deg)}
.quality-list{display:none;border-top:1px solid var(--glass-border)}
.quality-list.open{display:block}
.stream-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;font-size:.76rem;color:var(--text-dim)}
.stream-item:last-child{border-bottom:none}
.stream-item:hover{background:rgba(255,255,255,.04);color:var(--text)}
.stream-item-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stream-item-play{color:var(--accent-glow);font-size:.7rem;font-weight:600;white-space:nowrap}

/* ── VIDEO PLAYER ── */
.player-overlay{position:fixed;inset:0;z-index:500;background:#000;display:none;flex-direction:column}
.player-overlay.open{display:flex}
.player-top-bar{position:absolute;top:0;left:0;right:0;z-index:3;display:flex;align-items:center;gap:14px;padding:16px 24px;background:linear-gradient(rgba(0,0,0,.7),transparent);opacity:0;transition:opacity .35s}
.player-overlay:hover .player-top-bar,.player-overlay.show-controls .player-top-bar{opacity:1}
.player-close{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.15rem;transition:background .2s;border:1px solid rgba(255,255,255,.08)}
.player-close:hover{background:rgba(255,255,255,.2)}
.player-title{font-size:.88rem;font-weight:500;color:rgba(255,255,255,.85);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-video-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
.player-video-wrap video{width:100%;height:100%;background:#000}
.player-center-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:2;pointer-events:none;opacity:0;transition:opacity .25s;border:2px solid rgba(255,255,255,.15)}
.player-center-play svg{width:32px;height:32px;fill:#fff;margin-left:3px}
.player-center-play.visible{opacity:1}
.sub-overlay{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);z-index:4;text-align:center;pointer-events:none;max-width:80%;font-size:clamp(1.1rem, 2.5vw, 1.8rem);line-height:1.45;color:#fff;text-shadow:0 0 6px #000,0 0 12px #000,2px 2px 4px #000;font-family:inherit;white-space:pre-wrap;padding:6px 16px;border-radius:8px;background:rgba(0,0,0,.6)}
.sub-overlay:empty{display:none}
.player-controls{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:0 16px 12px;background:linear-gradient(transparent,rgba(0,0,0,.85));opacity:0;transition:opacity .35s}
.player-overlay:hover .player-controls,.player-overlay.show-controls .player-controls{opacity:1}
.progress-bar{width:100%;height:4px;background:rgba(255,255,255,.18);border-radius:2px;cursor:pointer;margin-bottom:8px;position:relative;transition:height .12s}
.progress-bar:hover{height:6px}
.progress-fill{height:100%;background:#f44336;border-radius:2px;pointer-events:none;transition:width .1s linear;position:relative}
.progress-fill::after{content:"";position:absolute;right:-6px;top:50%;transform:translateY(-50%) scale(0);width:14px;height:14px;border-radius:50%;background:#f44336;box-shadow:0 0 4px rgba(0,0,0,.4);transition:transform .12s}
.progress-bar:hover .progress-fill::after{transform:translateY(-50%) scale(1)}
.player-btns{display:flex;align-items:center;gap:6px}
.player-btn{color:#fff;display:flex;align-items:center;justify-content:center;width:36px;height:36px;transition:all .15s;border-radius:50%}
.player-btn:hover{background:rgba(255,255,255,.1)}
.player-btn svg{width:20px;height:20px;fill:#fff}
.player-time{font-size:.78rem;color:rgba(255,255,255,.65);font-weight:400;font-variant-numeric:tabular-nums;margin-left:4px}
.player-right{display:flex;align-items:center;gap:4px;margin-left:auto}
.player-vol-wrap{display:flex;align-items:center;gap:4px}
.player-vol-wrap svg{width:20px;height:20px;fill:#fff;flex-shrink:0;cursor:pointer}
.player-vol-wrap input[type=range]{width:60px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.2);border-radius:2px;outline:none;cursor:pointer;opacity:0;width:0;transition:width .2s,opacity .2s}
.player-vol-wrap:hover input[type=range]{width:60px;opacity:1}
.player-vol-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.player-speed{width:36px;height:36px;border-radius:50%;background:transparent;color:rgba(255,255,255,.85);font-size:.72rem;font-weight:600;cursor:pointer;border:none;transition:background .15s;display:flex;align-items:center;justify-content:center}
.player-speed:hover{background:rgba(255,255,255,.1)}
.player-cc,.player-audio{position:relative}
.player-cc-btn,.player-audio-btn{width:36px;height:36px;border-radius:50%;font-size:.62rem;font-weight:700;cursor:pointer;border:none;color:rgba(255,255,255,.85);background:transparent;transition:all .15s;letter-spacing:.3px;display:flex;align-items:center;justify-content:center}
.player-cc-btn.active,.player-audio-btn.active{color:#fff;background:rgba(255,255,255,.15)}
.player-cc-btn:hover,.player-audio-btn:hover{background:rgba(255,255,255,.1)}
.sub-dropdown,.audio-dropdown{position:absolute;bottom:44px;right:0;background:rgba(18,18,22,.95);border:1px solid rgba(255,255,255,.08);border-radius:12px;min-width:220px;max-height:300px;overflow-y:auto;display:none;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);z-index:10;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.sub-dropdown.open,.audio-dropdown.open{display:block}
.sub-dropdown-item{padding:10px 16px;font-size:.8rem;color:rgba(255,255,255,.7);cursor:pointer;transition:all .12s;display:flex;justify-content:space-between;align-items:center}
.sub-dropdown-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sub-dropdown-item.active{color:#fff}
.sub-dropdown-item.active::after{content:"✓";color:#fff;font-weight:700}
.sub-dropdown-header{padding:10px 16px;font-size:.72rem;font-weight:600;color:rgba(255,255,255,.5);border-bottom:1px solid rgba(255,255,255,.06);text-transform:uppercase;letter-spacing:.8px}
.sub-loading{padding:14px 16px;font-size:.78rem;color:rgba(255,255,255,.4);text-align:center}
.player-skip{color:#fff;display:flex;align-items:center;justify-content:center;width:36px;height:36px;cursor:pointer;transition:all .15s;background:none;border:none;position:relative;border-radius:50%}
.player-skip:hover{background:rgba(255,255,255,.1)}
.player-skip svg{width:20px;height:20px;fill:#fff}
.player-skip-label{font-size:.48rem;position:absolute;font-weight:700}

/* ── SETTINGS PANEL ── */
.settings-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;padding:20px}
.settings-overlay.open{display:flex}
.settings-panel{background:rgba(28,28,34,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px;padding:32px 36px;max-width:460px;width:100%;animation:modalIn .4s cubic-bezier(.22,1,.36,1);box-shadow:0 16px 64px rgba(0,0,0,.5);border:1px solid var(--glass-border)}
.settings-panel h2{font-size:1.15rem;margin-bottom:20px;font-weight:700;letter-spacing:-.2px}
.settings-panel label{font-size:.78rem;color:var(--text-dim);display:block;margin-bottom:6px;font-weight:500;letter-spacing:.2px}
.settings-panel input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--glass-border);background:rgba(255,255,255,.05);color:var(--text);font-size:.88rem;outline:none;margin-bottom:16px;transition:border .2s}
.settings-panel input:focus{border-color:rgba(255,255,255,.2)}
.settings-hint{font-size:.7rem;color:var(--text-dim);margin:-12px 0 16px;line-height:1.4;font-weight:300}
.settings-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-outline{padding:10px 20px;border-radius:20px;border:1px solid rgba(255,255,255,.1);color:var(--text-dim);font-size:.82rem;transition:all .2s;font-weight:500}
.btn-outline:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.btn-danger{padding:10px 20px;border-radius:20px;background:var(--red);color:#fff;font-size:.82rem;font-weight:600;transition:all .2s}
.btn-danger:hover{opacity:.85}

/* ── TRAKT ── */
.btn-trakt{width:100%;padding:12px;border-radius:20px;background:#ed1c24;color:#fff;font-weight:600;font-size:.85rem;transition:all .2s;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-trakt:hover{opacity:.9}
.btn-trakt-disconnect{margin-top:8px;width:100%;justify-content:center;font-size:.78rem;padding:8px;border-radius:16px}

.trakt-device-code{font-size:1.6rem;font-weight:800;letter-spacing:4px;color:#fff;text-align:center;padding:16px;margin:8px 0;background:rgba(255,255,255,.06);border-radius:12px}
.trakt-device-link{text-align:center;margin-bottom:12px;font-size:.82rem;color:var(--text-dim)}

.modal-trakt{display:flex;gap:8px;margin-bottom:18px;justify-content:center}
.btn-trakt-action{padding:8px 18px;border-radius:20px;font-size:.75rem;font-weight:600;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--text-dim);transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-trakt-action:hover{background:rgba(255,255,255,.08);color:var(--text)}
.btn-trakt-action.active{background:rgba(237,28,36,.15);border-color:rgba(237,28,36,.3);color:#ed1c24}
.btn-trakt-action.active svg{fill:#ed1c24}
.btn-trakt-action svg{width:14px;height:14px}

/* ── SEARCH RESULTS ── */
.search-results{padding:88px 36px 20px}
.search-results-title{font-size:1.1rem;font-weight:600;margin-bottom:16px;letter-spacing:-.2px}
.search-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--poster-w),1fr));gap:18px}

/* ── LOADING ── */
.row-loading{display:flex;gap:12px;padding:0 36px}
.skeleton{width:var(--poster-w);aspect-ratio:2/3;border-radius:var(--radius);background:linear-gradient(110deg,var(--card) 30%,rgba(255,255,255,.04) 50%,var(--card) 70%);background-size:200% 100%;animation:shimmer 1.6s infinite}
@keyframes shimmer{to{background-position:-200% 0}}

.message{text-align:center;padding:60px 20px;color:var(--text-dim)}
.message h3{margin-bottom:8px;color:var(--text);font-weight:600}

/* ── STAGGERED CARD ENTRANCE ── */
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.row-scroll .card{animation:cardIn .4s cubic-bezier(.22,1,.36,1) both}
.row-scroll .card:nth-child(1){animation-delay:0s}
.row-scroll .card:nth-child(2){animation-delay:.04s}
.row-scroll .card:nth-child(3){animation-delay:.08s}
.row-scroll .card:nth-child(4){animation-delay:.12s}
.row-scroll .card:nth-child(5){animation-delay:.16s}
.row-scroll .card:nth-child(6){animation-delay:.2s}
.row-scroll .card:nth-child(7){animation-delay:.24s}
.row-scroll .card:nth-child(8){animation-delay:.28s}
.row-scroll .card:nth-child(n+9){animation-delay:.3s}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .nav{padding:12px 16px;gap:10px}
  .nav-brand{font-size:1.05rem}
  .hero{height:65vh;min-height:320px;max-height:520px}

  .episode-grid{grid-template-columns:repeat(auto-fill,minmax(44px,1fr))}
  .settings-panel{padding:24px;border-radius:16px}
}
</style>
</head>

  loadCatalogs();
  if (traktAccessToken) loadTraktData();
  bindEvents();
}

// ── EVENTS ──
function bindEvents() {
  document.getElementById("setupSaveBtn")?.addEventListener("click", () => {
    init();
  });

  document.getElementById("searchInput").addEventListener("input", (e) => {
    clearTimeout(searchTimeout);
    const q = e.target.value.trim();
    if (!q) { hideSearch(); return; }
    searchTimeout = setTimeout(() => runSearch(q), 400);
  });

  document.getElementById("aiToggle").addEventListener("click", () => {
    aiMode = !aiMode;
    document.getElementById("aiToggle").classList.toggle("active", aiMode);
    document.getElementById("searchInput").placeholder = aiMode
      ? "Describe what you want to watch..." : "Search movies & TV shows...";
  });

  // Settings
  document.getElementById("settingsBtn").addEventListener("click", () => {
    document.getElementById("settingsDebridInput").value = debridUrl;
    updateTraktSettingsUI();
    document.getElementById("settingsOverlay").classList.add("open");
  });
  document.getElementById("settingsCancelBtn").addEventListener("click", closeSettings);
  document.getElementById("settingsSaveBtn").addEventListener("click", () => {
    const dUrl = document.getElementById("settingsDebridInput").value.trim();
    debridUrl = dUrl; localStorage.setItem("debridio_url", dUrl);
    closeSettings();
  });
  document.getElementById("settingsClearBtn").addEventListener("click", () => {
    localStorage.removeItem("debridio_url");
    localStorage.removeItem("trakt_access_token");
    localStorage.removeItem("trakt_refresh_token");
    debridUrl = "";
    traktAccessToken = ""; traktRefreshToken = "";
    traktWatchedSet.clear(); traktWatchlistSet.clear();
    closeSettings();
    location.reload();
  });
  document.getElementById("traktConnectBtn").addEventListener("click", startTraktAuth);
  document.getElementById("traktDisconnectBtn").addEventListener("click", disconnectTrakt);
  document.getElementById("btnTraktWatchlist").addEventListener("click", toggleTraktWatchlist);
  document.getElementById("btnTraktWatched").addEventListener("click", toggleTraktWatched);
  document.getElementById("settingsOverlay").addEventListener("click", (e) => {
    if (e.target === e.currentTarget) closeSettings();
  });

  // Modal
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("modalOverlay").addEventListener("click", (e) => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById("btnWatch").addEventListener("click", onWatchClick);
  document.getElementById("btnTrailer").addEventListener("click", showTrailer);

  // Player
  document.getElementById("playerClose").addEventListener("click", closePlayer);
  document.getElementById("btnPlayPause").addEventListener("click", togglePlayPause);
  document.getElementById("btnFullscreen").addEventListener("click", toggleFullscreen);
  document.getElementById("btnPip").addEventListener("click", togglePip);
  document.getElementById("btnSkipBack").addEventListener("click", () => { document.getElementById("playerVideo").currentTime -= 10; });
  document.getElementById("btnSkipForward").addEventListener("click", () => { document.getElementById("playerVideo").currentTime += 10; });
  document.getElementById("playerVideoWrap").addEventListener("click", (e) => {
    if (e.target.closest(".sub-overlay")) return;
    togglePlayPause();
  });
  document.getElementById("progressBar").addEventListener("click", seekVideo);
  document.getElementById("playerOverlay").addEventListener("mousemove", showPlayerControls);
  document.getElementById("playerVideo").addEventListener("timeupdate", updateProgress);
  document.getElementById("playerVideo").addEventListener("play", updateCenterPlay);
  document.getElementById("playerVideo").addEventListener("pause", updateCenterPlay);
  document.getElementById("playerVideo").addEventListener("ended", closePlayer);
  document.getElementById("volumeSlider").addEventListener("input", (e) => {
    document.getElementById("playerVideo").volume = parseFloat(e.target.value);
  });
  document.getElementById("btnSpeed").addEventListener("click", cycleSpeed);
  document.getElementById("btnCC").addEventListener("click", toggleSubDropdown);
  document.getElementById("btnAudio").addEventListener("click", toggleAudioDropdown);
  document.getElementById("playerOverlay").addEventListener("click", (e) => {
    if (!e.target.closest(".player-cc") && !e.target.closest(".player-audio") && !e.target.closest(".player-controls")) {
      document.getElementById("subDropdown").classList.remove("open");
      document.getElementById("audioDropdown").classList.remove("open");
    }
  });

  document.addEventListener("keydown", (e) => {
    const player = document.getElementById("playerOverlay");
    if (player.classList.contains("open")) {
      if (e.key === "Escape") closePlayer();
      else if (e.key === " ") { e.preventDefault(); togglePlayPause(); }
      else if (e.key === "f" || e.key === "F") toggleFullscreen();
      else if (e.key === "ArrowRight") { document.getElementById("playerVideo").currentTime += 10; }
      else if (e.key === "ArrowLeft") { document.getElementById("playerVideo").currentTime -= 10; }
      else if (e.key === "m" || e.key === "M") {
        const v = document.getElementById("playerVideo");
        v.muted = !v.muted;
        document.getElementById("volumeSlider").value = v.muted ? 0 : v.volume;
      }
      else if (e.key === "c" || e.key === "C") { toggleSubDropdown(); }
      else if (e.key === "a" || e.key === "A") { toggleAudioDropdown(); }
      return;
    }
    if (e.key === "Escape") { closeModal(); closeSettings(); }
  });
}

function closeSettings() { document.getElementById("settingsOverlay").classList.remove("open"); }
function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
  resetModalMedia();
  currentItem = null; currentImdbId = null; currentTrailerKey = null;
  currentSeasons = []; currentSelectedSeason = null; currentSelectedEpisode = null;
  currentOriginalLang = null; currentIsAnime = false;
}

function resetModalMedia() {
  const area = document.getElementById("modalMediaArea");
  area.innerHTML = '<img class="modal-backdrop" id="modalBackdrop" src="" alt="">';
}

// ── TMDB FETCH ──
async function tmdbFetch(endpoint, params = {}) {
  const url = new URL(TMDB_BASE + endpoint);
  url.searchParams.set("api_key", apiKey);
  url.searchParams.set("language", "en-US");
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url);
  if (!res.ok) throw new Error(`TMDB ${res.status}`);
  return res.json();
}

// ── HERO CAROUSEL ──
async function loadHero() {
  try {
    const data = await tmdbFetch("/trending/all/week");
    heroItems = (data.results || [])
      .filter(r => r.backdrop_path && (r.media_type === "movie" || r.media_type === "tv"))
      .slice(0, 10)
      .map(normalizeItem);
    renderHero();
    startHeroAutoplay();
  } catch (_) {}
}

function renderHero() {
  const container = document.getElementById("heroCarousel");
  if (!heroItems.length) { container.style.display = "none"; return; }

  const slides = heroItems.map((item, i) => {
    const year = item.releaseDate ? item.releaseDate.substring(0, 4) : "";
    const genres = (item.genreIds || []).map(id => GENRE_MAP[id]).filter(Boolean).slice(0, 3).join(", ");
    const rating = item.rating ? `★ ${item.rating.toFixed(1)}` : "";
    const type = item.mediaType === "tv" ? "TV Show" : "Movie";
    return `<div class="hero-slide${i === 0 ? " active" : ""}" data-hero-idx="${i}">
      <img class="hero-slide-bg" src="${TMDB_IMG}w1280${item.backdropPath}" alt="" loading="${i < 2 ? "eager" : "lazy"}">
      <div class="hero-gradient"></div>
      <div class="hero-content">
        <div class="hero-title">${esc(item.title)}</div>
        <div class="hero-meta">
          ${year ? `<span>${year}</span>` : ""}
          <span>${type}</span>
          ${genres ? `<span>${genres}</span>` : ""}
          ${rating ? `<span class="hero-rating">${rating}</span>` : ""}
        </div>
        <div class="hero-desc">${esc(item.overview)}</div>
        <div class="hero-actions">
          <button class="hero-btn hero-btn-primary" data-hero-action="details" data-hero-idx="${i}">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            Details
          </button>
        </div>
      </div>
    </div>`;
  }).join("");

  const dots = heroItems.map((_, i) =>
    `<button class="hero-dot${i === 0 ? " active" : ""}" data-hero-dot="${i}"></button>`
  ).join("");

  container.innerHTML = slides + `<div class="hero-dots">${dots}</div><div class="hero-progress" id="heroProgress"></div>`;

  container.querySelectorAll("[data-hero-action='details']").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.dataset.heroIdx);
      openModal(heroItems[idx]);
    });
  });

  container.querySelectorAll(".hero-dot").forEach(dot => {
    dot.addEventListener("click", () => {
      goToHeroSlide(parseInt(dot.dataset.heroDot));
    });
  });
}

function goToHeroSlide(idx) {
  heroIndex = idx;
  const slides = document.querySelectorAll(".hero-slide");
  const dots = document.querySelectorAll(".hero-dot");
  slides.forEach((s, i) => s.classList.toggle("active", i === idx));
  dots.forEach((d, i) => d.classList.toggle("active", i === idx));
  resetHeroProgress();
}

function startHeroAutoplay() {
  clearInterval(heroTimer);
  resetHeroProgress();
  heroTimer = setInterval(() => {
    heroIndex = (heroIndex + 1) % heroItems.length;
    goToHeroSlide(heroIndex);
  }, HERO_INTERVAL);
}

function resetHeroProgress() {
  const bar = document.getElementById("heroProgress");
  if (!bar) return;
  bar.style.transition = "none";
  bar.style.width = "0%";
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${HERO_INTERVAL}ms linear`;
      bar.style.width = "100%";
    });
  });
}

// ── CATALOGS ──
async function loadCatalogs() {
  loadHero();
  const container = document.getElementById("catalogRows");
  container.innerHTML = "";
  for (const cat of CATALOGS) {
    const row = createRowSkeleton(cat.title);
    container.appendChild(row);
    try {
      const data = await tmdbFetch(cat.endpoint);
      renderRowCards(row, (data.results || []).map(normalizeItem));
    } catch (err) {
      row.querySelector(".row-scroll,.row-loading").innerHTML =
        `<div class="message" style="padding:20px"><h3>Failed to load</h3><p>${err.message}</p></div>`;
    }
  }
}

function createRowSkeleton(title) {
  const div = document.createElement("div");
  div.className = "row";
  div.innerHTML = `<div class="row-header"><div class="row-title">${title}</div><span class="row-chevron">›</span></div>
    <div class="row-loading">${Array(8).fill('<div class="skeleton"></div>').join("")}</div>`;
  return div;
}

function renderRowCards(rowEl, items) {
  const loading = rowEl.querySelector(".row-loading");
  if (loading) loading.remove();
  const scroll = document.createElement("div");
  scroll.className = "row-scroll";
  items.forEach(item => scroll.appendChild(createCard(item)));
  rowEl.appendChild(scroll);
}

// ── CARD ──
function createCard(item) {
  const card = document.createElement("div");
  card.className = "card";
  const rc = item.rating >= 7 ? "rating-high" : item.rating >= 5 ? "rating-mid" : "rating-low";
  const year = item.releaseDate ? item.releaseDate.substring(0, 4) : "";
  const lang = (item.originalLanguage || "").toLowerCase();
  const langBadges = { es: "ES", ja: "JA", ko: "KO", zh: "ZH", fr: "FR", de: "DE", pt: "PT", it: "IT", hi: "HI" };
  const langLabel = langBadges[lang] || "";
  const langClass = lang === "es" ? "card-lang-es" : lang === "ja" ? "card-lang-ja" : lang === "ko" ? "card-lang-ko" : "card-lang-es";
  if (item.posterPath) {
    card.innerHTML = `
      <div class="card-poster">
        <img class="card-img" src="${TMDB_IMG}w342${item.posterPath}" alt="${esc(item.title)}" loading="lazy">
        ${langLabel && lang !== "en" ? `<div class="card-lang ${langClass}">${langLabel}</div>` : ""}
        ${item.mediaType ? `<div class="card-badge">${item.mediaType === "tv" ? "TV" : "Film"}</div>` : ""}
      </div>
      <div class="card-info">
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-meta">
          ${year ? `<span>${year}</span>` : ""}
          ${item.rating ? `<span class="card-rating ${rc}">★ ${item.rating.toFixed(1)}</span>` : ""}
        </div>
      </div>`;
  } else {
    card.innerHTML = `<div class="card-no-img">${esc(item.title)}</div>`;
  }
  card.addEventListener("click", () => openModal(item));
  return card;
}

// ── MODAL ──
async function openModal(item) {
  currentItem = item;
  currentImdbId = null;
  currentTrailerKey = null;
  currentSeasons = [];
  currentSelectedSeason = null;
  currentSelectedEpisode = null;
  currentOriginalLang = null;
  currentIsAnime = false;

  const o = document.getElementById("modalOverlay");
  resetModalMedia();
  document.getElementById("modalBackdrop").src = item.backdropPath
    ? `${TMDB_IMG}w1280${item.backdropPath}` : "";
  document.getElementById("modalTitle").textContent = item.title;
  document.getElementById("modalTagline").textContent = "";
  const year = item.releaseDate ? item.releaseDate.substring(0, 4) : "";
  const rc = item.rating >= 7 ? "rating-high" : item.rating >= 5 ? "rating-mid" : "rating-low";
  document.getElementById("modalMeta").innerHTML = [
    year, item.rating ? `<span class="rating ${rc}">★ ${item.rating.toFixed(1)}</span>` : "",
    item.mediaType === "tv" ? "TV Show" : item.mediaType === "movie" ? "Movie" : ""
  ].filter(Boolean).join(" &nbsp;·&nbsp; ");

  document.getElementById("modalGenres").innerHTML = (item.genreIds || [])
    .map(id => GENRE_MAP[id]).filter(Boolean)
    .map(g => `<span class="genre-tag">${g}</span>`).join("");
  document.getElementById("modalOverview").textContent = item.overview || "No description available.";
  document.getElementById("modalCast").innerHTML = "";
  document.getElementById("modalCastTitle").style.display = "none";

  document.getElementById("modalActions").style.display = "none";
  document.getElementById("btnTrailer").style.display = "none";
  document.getElementById("episodePicker").classList.remove("visible");
  document.getElementById("sourcePanel").classList.remove("visible");
  document.getElementById("sourcePanel").innerHTML = "";
  document.getElementById("modalTrakt").style.display = traktAccessToken ? "flex" : "none";
  document.getElementById("btnTraktWatchlist").classList.remove("active");
  document.getElementById("btnTraktWatched").classList.remove("active");

  o.classList.add("open");
  updateTraktButtons();

  if (!apiKey || !item.id || !item.mediaType) return;

  const type = item.mediaType === "tv" ? "tv" : "movie";
  try {
    const [detail, credits, videos] = await Promise.all([
      tmdbFetch(`/${type}/${item.id}`),
      tmdbFetch(`/${type}/${item.id}/credits`),
      tmdbFetch(`/${type}/${item.id}/videos`),
    ]);

    currentOriginalLang = detail.original_language || null;
    const genreIds = (detail.genres || []).map(g => g.id);
    currentIsAnime = genreIds.includes(16) && currentOriginalLang === "ja";

    if (detail.tagline) document.getElementById("modalTagline").textContent = detail.tagline;
    if (detail.genres) {
      document.getElementById("modalGenres").innerHTML = detail.genres
        .map(g => `<span class="genre-tag">${g.name}</span>`).join("");
    }
    if (detail.overview) document.getElementById("modalOverview").textContent = detail.overview;

    // IMDB ID
    if (detail.imdb_id) {
      currentImdbId = detail.imdb_id;
    } else if (type === "tv") {
      try {
        const ext = await tmdbFetch(`/tv/${item.id}/external_ids`);
        currentImdbId = ext.imdb_id || null;
      } catch (_) {}
    }
    updateTraktButtons();

    // Trailer
    const trailers = (videos.results || []).filter(
      v => v.site === "YouTube" && (v.type === "Trailer" || v.type === "Teaser")
    );
    if (trailers.length) {
      currentTrailerKey = trailers[0].key;
      document.getElementById("btnTrailer").style.display = "flex";
    }

    // Show action buttons
    document.getElementById("modalActions").style.display = "flex";

    // Cast
    if (credits.cast && credits.cast.length) {
      document.getElementById("modalCastTitle").style.display = "block";
      document.getElementById("modalCast").innerHTML = credits.cast.slice(0, 12).map(c =>
        `<div class="cast-card">
          <img class="cast-img" src="${c.profile_path ? TMDB_IMG + "w185" + c.profile_path : ""}" alt="" loading="lazy">
          <div class="cast-name">${esc(c.name)}</div>
          <div class="cast-char">${esc(c.character || "")}</div>
        </div>`
      ).join("");
    }

    // TV seasons
    if (type === "tv" && detail.seasons) {
      currentSeasons = detail.seasons.filter(s => s.season_number > 0);
      if (currentSeasons.length) {
        const resumeS = item.resumeSeason || null;
        const resumeE = item.resumeEpisode || null;
        renderSeasonPicker(resumeS, resumeE);
      }
    }
  } catch (_) {}
}

// ── EPISODE PICKER ──
function renderSeasonPicker(resumeSeason, resumeEpisode) {
  const picker = document.getElementById("episodePicker");
  const sel = document.getElementById("seasonSelect");
  sel.innerHTML = currentSeasons.map(s =>
    `<option value="${s.season_number}">Season ${s.season_number} (${s.episode_count} episodes)</option>`
  ).join("");
  picker.classList.add("visible");
  sel.addEventListener("change", () => loadEpisodes(parseInt(sel.value)));
  const startSeason = resumeSeason && currentSeasons.some(s => s.season_number === resumeSeason)
    ? resumeSeason : currentSeasons[0].season_number;
  sel.value = startSeason;
  loadEpisodes(startSeason, resumeEpisode || (startSeason === currentSeasons[0].season_number ? 1 : null));

async function loadEpisodes(seasonNum, autoSelectEp) {
  currentSelectedSeason = seasonNum;
  currentSelectedEpisode = null;
  const grid = document.getElementById("episodeGrid");
  const epName = document.getElementById("epName");
  grid.innerHTML = '<div class="source-loading">Loading episodes...</div>';
  epName.textContent = "";

  document.getElementById("sourcePanel").classList.remove("visible");
  document.getElementById("sourcePanel").innerHTML = "";

  try {
    const data = await tmdbFetch(`/tv/${currentItem.id}/season/${seasonNum}`);
    const eps = data.episodes || [];
    grid.innerHTML = eps.map(ep =>
      `<button class="ep-btn" data-ep="${ep.episode_number}" data-name="${esc(ep.name || "")}" title="${esc(ep.name || "Episode " + ep.episode_number)}">
        ${ep.episode_number}

    ).join("");

    grid.querySelectorAll(".ep-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        grid.querySelectorAll(".ep-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentSelectedEpisode = parseInt(btn.dataset.ep);
        epName.textContent = btn.dataset.name ? `E${currentSelectedEpisode}: ${btn.dataset.name}` : `Episode ${currentSelectedEpisode}`;
        document.getElementById("sourcePanel").classList.remove("visible");
        document.getElementById("sourcePanel").innerHTML = "";
      });
    });

    const pickEp = autoSelectEp || 1;
    const target = grid.querySelector(`.ep-btn[data-ep="${pickEp}"]`);
    if (target) target.click();
  } catch (err) {
    grid.innerHTML = `<div class="source-loading">Failed to load episodes</div>`;
  }
}

// ── WATCH / SOURCES ──
function onWatchClick() {
  if (!currentImdbId) {
    alert("No IMDB ID found for this title.");
    return;
  }
  if (!debridUrl) {
    alert("No Debridio addon URL configured. Add it in Settings.");
    return;
  }
  if (currentItem.mediaType === "tv" && !currentSelectedEpisode) {
    alert("Select an episode first.");
    return;
  }
  fetchStreams();
}

async function fetchStreams() {
  const panel = document.getElementById("sourcePanel");
  panel.classList.add("visible");
  panel.innerHTML = '<div class="source-loading">Fetching sources...</div>';

  const base = debridUrl.replace(/\/manifest\.json\s*$/i, "").replace(/\/+$/, "");
  const type = currentItem.mediaType === "tv" ? "series" : "movie";
  let streamId = currentImdbId;
  if (type === "series") {
    streamId = `${currentImdbId}:${currentSelectedSeason}:${currentSelectedEpisode}`;
  }

  try {
    const res = await fetch(`${base}/stream/${type}/${streamId}.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const streams = data.streams || [];

    if (!streams.length) {
      panel.innerHTML = '<div class="no-sources">No sources found for this title.</div>';
      return;
    }

    const groups = groupByQuality(streams);
    renderSources(panel, groups);
  } catch (err) {
    panel.innerHTML = `<div class="no-sources">Failed to load sources: ${esc(err.message)}</div>`;
  }
}

function parseQuality(title) {
  if (!title) return "Other";
  const t = title.toLowerCase();
  if (/2160p|4k|uhd/.test(t)) return "4K";
  if (/1080p/.test(t)) return "1080p";
  if (/720p/.test(t)) return "720p";
  if (/480p/.test(t)) return "480p";
  return "Other";
}

const FOREIGN_AUDIO_RE = /\b(italian|ita|french|fra|fre|german|deu|ger|portuguese|por|russian|rus|hindi|hin|arabic|ara|turkish|tur|polish|pol|dutch|nld|dut|korean|kor|chinese|zho|chi|thai|tha|czech|ces|romanian|ron|hungarian|hun|swedish|swe|danish|dan|norwegian|nor|finnish|fin|greek|ell|hebrew|heb|vietnamese|vie|indonesian|ind|malay|msa|bulgarian|bul|croatian|hrv|serbian|srp|ukrainian|ukr|tamil|telugu|kannada|malayalam)\b/i;

function audioScore(title) {
  const t = (title || "").toLowerCase();
  const isDual = /dual.?audio|multi/i.test(t);
  const isEnglish = /english|eng\b|en\b/i.test(t);
  const isSpanish = /spanish|spa\b|español|latino/i.test(t);
  const hasForeign = FOREIGN_AUDIO_RE.test(t);

  if (currentIsAnime) {
    const isJpn = /japanese|jpn|ja\b/i.test(t);
    if (isJpn && !isDual) return 0;
    if (isDual) return 1;
    if (isEnglish || isSpanish) return 2;
    if (hasForeign) return 10;
    return 3;
  }

  if (currentOriginalLang && currentOriginalLang !== "en") {
    if (isDual) return 0;
    const origRe = new RegExp("\\b" + currentOriginalLang + "\\b", "i");
    if (origRe.test(t)) return 1;
    if (isEnglish) return 2;
    if (isSpanish) return 3;
    if (hasForeign) return 10;
    return 4;
  }

  if (isEnglish && !hasForeign) return 0;
  if (isEnglish && isDual) return 0;
  if (isDual) return 1;
  if (isSpanish) return 2;
  if (!hasForeign) return 3;
  return 10;
}

function groupByQuality(streams) {
  const order = ["4K", "1080p", "720p", "480p", "Other"];
  const groups = {};
  order.forEach(q => groups[q] = []);

  streams.forEach(s => {
    const q = parseQuality(s.title || s.name || "");
    groups[q].push(s);
  });

  for (const q of order) {
    groups[q].sort((a, b) => audioScore(a.title || a.name) - audioScore(b.title || b.name));
  }

  return order.filter(q => groups[q].length).map(q => ({ quality: q, streams: groups[q] }));
}

function renderSources(panel, groups) {
  if (!groups.length) {
    panel.innerHTML = '<div class="no-sources">No sources found.</div>';
    return;
  }

  const prefIdx = groups.findIndex(g => g.quality === preferredQuality);
  const activeIdx = prefIdx !== -1 ? prefIdx : 0;

  const tabs = groups.map((g, gi) => {
    const badgeClass = g.quality === "4K" ? "q-4k" : g.quality === "1080p" ? "q-1080p" :
      g.quality === "720p" ? "q-720p" : g.quality === "480p" ? "q-480p" : "q-other";
    return `<button class="quality-tab ${badgeClass}${gi === activeIdx ? " active" : ""}" data-qtab="${gi}" data-quality="${g.quality}">${g.quality} <span style="opacity:.6;font-weight:400">(${g.streams.length})</span></button>`;
  }).join("");

  function buildSourceCards(streams) {
    return streams.map(s => {
      const t = (s.title || s.name || "").replace(/\n/g, " ").trim();
      return `<div class="source-card" data-url="${esc(s.url)}" data-title="${esc(t)}">
        <div class="source-card-title">${esc(t)}</div>
        <div class="source-card-meta">
          <span class="source-card-badge">RD</span>
          <span class="source-card-play">▶ Play</span>
        </div>
      </div>`;
    }).join("");
  }

  panel.innerHTML = `<div class="quality-tabs">${tabs}</div><div class="source-list" id="sourceList">${buildSourceCards(groups[activeIdx].streams)}</div>`;

  function bindSourceCards() {
    panel.querySelectorAll(".source-card").forEach(card => {
      card.addEventListener("click", () => {
        openPlayer(card.dataset.url, card.dataset.title);
      });
    });
  }
  bindSourceCards();

  panel.querySelectorAll(".quality-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      panel.querySelectorAll(".quality-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      const idx = parseInt(tab.dataset.qtab);
      preferredQuality = tab.dataset.quality;
      localStorage.setItem("preferred_quality", preferredQuality);
      document.getElementById("sourceList").innerHTML = buildSourceCards(groups[idx].streams);
      bindSourceCards();
    });
  });
}

// ── VIDEO PLAYER ──
function onAudioTrackAdd() {
  probeAudioTracks();
  autoSelectAudioTrack();
}

function openPlayer(url, title) {
  if (!url) return;
  const overlay = document.getElementById("playerOverlay");
  const video = document.getElementById("playerVideo");
  document.getElementById("playerTitle").textContent = title || "";

  activeSubTrackUrl = null;
  currentSubtitles = [];
  parsedCues = [];
  document.getElementById("subOverlay").textContent = "";
  document.getElementById("btnCC").classList.remove("active");
  document.getElementById("subDropdown").classList.remove("open");
  document.getElementById("audioDropdown").classList.remove("open");
  document.getElementById("subList").innerHTML = '<div class="sub-loading">Loading subtitles...</div>';
  document.getElementById("audioList").innerHTML = '<div class="sub-loading">Detecting audio tracks...</div>';

  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  if (/\.m3u8/i.test(url)) {
    if (Hls && Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        probeAudioTracks();
        autoSelectAudioTrack();
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = url;
    }
  } else {
    video.src = url;
  }

  // reset speed display
  video.playbackRate = 1;
  document.getElementById("btnSpeed").textContent = "1x";

  overlay.classList.add("open");
  video.play().catch(() => {});
  showPlayerControls();

  video.addEventListener("loadedmetadata", () => {
    probeAudioTracks();
    autoSelectAudioTrack();
  }, { once: true });

  video.addEventListener("canplay", () => {
    probeAudioTracks();
    autoSelectAudioTrack();
  }, { once: true });

  if (video.audioTracks) {
    video.audioTracks.addEventListener("addtrack", onAudioTrackAdd);
  }

  // fetch subtitles in background
  if (currentImdbId) {
    const type = currentItem?.mediaType === "tv" ? "series" : "movie";
    let subId = currentImdbId;
    if (type === "series" && currentSelectedSeason && currentSelectedEpisode) {
      subId = `${currentImdbId}:${currentSelectedSeason}:${currentSelectedEpisode}`;
    }
    fetchSubtitles(type, subId);
  }
}

function closePlayer() {
  const overlay = document.getElementById("playerOverlay");
  const video = document.getElementById("playerVideo");
  overlay.classList.remove("open");
  video.pause();
  if (video.audioTracks) {
    video.audioTracks.removeEventListener("addtrack", onAudioTrackAdd);
  }
  video.removeAttribute("src");
  video.load();
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
  currentSubtitles = [];
  activeSubTrackUrl = null;
  parsedCues = [];
  document.getElementById("subOverlay").textContent = "";
  document.getElementById("subDropdown").classList.remove("open");
  document.getElementById("audioDropdown").classList.remove("open");
}

function togglePlayPause() {
  const v = document.getElementById("playerVideo");
  if (v.paused) v.play();
  else v.pause();
}

function toggleFullscreen() {
  const el = document.getElementById("playerOverlay");
  if (!document.fullscreenElement) el.requestFullscreen().catch(() => {});
  else document.exitFullscreen().catch(() => {});
}

function seekVideo(e) {
  const bar = document.getElementById("progressBar");
  const v = document.getElementById("playerVideo");
  if (!v.duration) return;
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  v.currentTime = pct * v.duration;
}

function updateProgress() {
  const v = document.getElementById("playerVideo");
  if (!v.duration) return;
  const pct = (v.currentTime / v.duration) * 100;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("playerTime").textContent =
    `${fmtTime(v.currentTime)} / ${fmtTime(v.duration)}`;
  renderSubOverlay(v.currentTime);
}

function fmtTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  if (h) return `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  return `${m}:${String(sec).padStart(2,"0")}`;
}

function showPlayerControls() {
  const o = document.getElementById("playerOverlay");
  o.classList.add("show-controls");
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => o.classList.remove("show-controls"), 3000);
}

function updateCenterPlay() {

  if (v.paused) {

function togglePip() {

function parseSrt(text) {
  const normalized = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  const blocks = normalized.split(/\n\n+/).filter(b => b.trim());
  const cues = [];
  for (const block of blocks) {
    const lines = block.trim().split("\n");
    if (lines.length < 2) continue;
    // find the timestamp line (skip WEBVTT header, sequence numbers, etc.)
    let tsIdx = -1;
    for (let i = 0; i < lines.length; i++) {
      if (/-->/.test(lines[i])) { tsIdx = i; break; }
    }
    if (tsIdx === -1) continue;
    const parts = lines[tsIdx].split("-->");
    if (parts.length < 2) continue;
    const start = parseTimestamp(parts[0].trim());
    const end = parseTimestamp(parts[1].trim().split(/\s/)[0]);
    if (start === null || end === null) continue;
    const content = lines.slice(tsIdx + 1).join("\n")
      .replace(/<[^>]+>/g, "")
      .replace(/\{\\[^}]*\}/g, "")
      .replace(/\{[^}]*\}/g, "")
      .trim();
    if (content) cues.push({ start, end, text: content });
  }
  return cues;
}

function parseTimestamp(ts) {
  ts = ts.replace(",", ".");
  const m = ts.match(/(?:(\d+):)?(\d{2}):(\d{2})\.(\d{3})/);
  if (!m) return null;
  const h = parseInt(m[1] || "0");
  const min = parseInt(m[2]);
  const sec = parseInt(m[3]);
  const ms = parseInt(m[4]);
  return h * 3600 + min * 60 + sec + ms / 1000;
}

function renderSubOverlay(time) {
  const overlay = document.getElementById("subOverlay");
  if (!parsedCues.length) { overlay.textContent = ""; return; }
  const active = parsedCues.filter(c => time >= c.start && time <= c.end);
  const txt = active.map(c => c.text).join("\n");
  if (overlay.textContent !== txt) overlay.textContent = txt;
}

// ── AUDIO TRACKS ──
function toggleAudioDropdown() {
  document.getElementById("subDropdown").classList.remove("open");
  document.getElementById("audioDropdown").classList.toggle("open");
}

function probeAudioTracks() {
  const list = document.getElementById("audioList");
  const tracks = getAudioTracks();
  if (!tracks.length) {
    list.innerHTML = '<div class="sub-loading">No audio tracks detected</div>';
    return;
  }
  renderAudioList(tracks);
}

function getAudioTracks() {
  const tracks = [];
  if (hlsInstance && hlsInstance.audioTracks && hlsInstance.audioTracks.length > 0) {
    hlsInstance.audioTracks.forEach((t, i) => {
      tracks.push({
        index: i,
        label: t.name || t.lang || `Track ${i + 1}`,
        lang: t.lang || "",
        source: "hls",
        active: hlsInstance.audioTrack === i
      });
    });
  } else {
    const video = document.getElementById("playerVideo");
    if (video.audioTracks && video.audioTracks.length > 0) {
      for (let i = 0; i < video.audioTracks.length; i++) {
        const t = video.audioTracks[i];
        tracks.push({
          index: i,
          label: t.label || t.language || `Track ${i + 1}`,
          lang: t.language || "",
          source: "native",
          active: t.enabled
        });
      }
    }
  }
  return tracks;
}

function renderAudioList(tracks) {
  const list = document.getElementById("audioList");
  list.innerHTML = tracks.map((t, i) => {
    const langName = LANG_NAMES[t.lang] || t.label || `Track ${i + 1}`;
    const display = langName + (t.label && t.label !== langName ? ` (${t.label})` : "");
    return `<div class="sub-dropdown-item${t.active ? " active" : ""}" data-audio-idx="${t.index}" data-audio-src="${t.source}">${display}</div>`;
  }).join("");

  list.querySelectorAll(".sub-dropdown-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.audioIdx);
      const src = el.dataset.audioSrc;
      switchAudioTrack(idx, src);
      document.getElementById("audioDropdown").classList.remove("open");
    });
  });
}

function switchAudioTrack(idx, source) {
  if (source === "hls" && hlsInstance) {
    hlsInstance.audioTrack = idx;
  } else {
    const video = document.getElementById("playerVideo");
    if (video.audioTracks) {
      for (let i = 0; i < video.audioTracks.length; i++) {
        video.audioTracks[i].enabled = (i === idx);
      }
    }
  }
  document.getElementById("btnAudio").classList.add("active");
  setTimeout(() => probeAudioTracks(), 100);
}

function autoSelectAudioTrack() {
  const tracks = getAudioTracks();
  if (tracks.length < 2) return;

  let preferred = -1;
  if (currentIsAnime) {
    preferred = tracks.findIndex(t => /^ja/i.test(t.lang) || /japanese|jpn/i.test(t.label));
    if (preferred === -1) preferred = tracks.findIndex(t => /dual|multi/i.test(t.label));
    if (preferred === -1) preferred = tracks.findIndex(t => /^en/i.test(t.lang) || /english|eng/i.test(t.label));
  } else if (currentOriginalLang && currentOriginalLang !== "en") {
    preferred = tracks.findIndex(t => t.lang.startsWith(currentOriginalLang));
    if (preferred === -1) preferred = tracks.findIndex(t => /dual|multi/i.test(t.label));
    if (preferred === -1) preferred = tracks.findIndex(t => /^en/i.test(t.lang) || /english|eng/i.test(t.label));
  } else {
    preferred = tracks.findIndex(t => /^en/i.test(t.lang) || /english|eng/i.test(t.label));
  }

  if (preferred !== -1 && !tracks[preferred].active) {
    switchAudioTrack(tracks[preferred].index, tracks[preferred].source);
  }
}

const TRAKT_API = "https://api.trakt.tv";

function traktHeaders() {
  return {
    "Content-Type": "application/json",
    "trakt-api-version": "2",
    "trakt-api-key": TRAKT_CID,
    ...(traktAccessToken ? { Authorization: `Bearer ${traktAccessToken}` } : {})
  };
}

function updateTraktSettingsUI() {
  const connectBtn = document.getElementById("traktConnectBtn");
  const status = document.getElementById("traktStatus");
  const disconnectBtn = document.getElementById("traktDisconnectBtn");

  if (traktAccessToken) {
    connectBtn.style.display = "none";

    disconnectBtn.style.display = "block";
  } else {
    connectBtn.style.display = "flex";
    status.style.display = "none";
    disconnectBtn.style.display = "none";
  }
}

function disconnectTrakt() {
  traktAccessToken = ""; traktRefreshToken = "";
  localStorage.removeItem("trakt_access_token");
  localStorage.removeItem("trakt_refresh_token");
  traktWatchedSet.clear(); traktWatchlistSet.clear();
  updateTraktSettingsUI();
}

async function startTraktAuth() {
  const status = document.getElementById("traktStatus");
  const connectBtn = document.getElementById("traktConnectBtn");
  connectBtn.style.display = "none";
  status.style.display = "block";
  status.className = "trakt-status";
  status.innerHTML = "Requesting device code...";

  try {
    const res = await fetch(`${TRAKT_API}/oauth/device/code`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ client_id: TRAKT_CID })
    });
    const data = await res.json();
    const { device_code, user_code, verification_url, expires_in, interval } = data;

    status.innerHTML = `
      <div class="trakt-device-link">Go to <a href="${verification_url}" target="_blank">${verification_url}</a> and enter:</div>
      <div class="trakt-device-code">${user_code}</div>
      <div style="text-align:center;font-size:.75rem;color:var(--text-dim)">Waiting for authorization...</div>
    `;

    const pollInterval = (interval || 5) * 1000;
    const deadline = Date.now() + expires_in * 1000;

    const poll = setInterval(async () => {
      if (Date.now() > deadline) {
        clearInterval(poll);
        status.innerHTML = "Code expired. Try again.";
        connectBtn.style.display = "flex";
        return;
      }
      try {
        const tokenRes = await fetch(`${TRAKT_API}/oauth/device/token`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code: device_code, client_id: TRAKT_CID, client_secret: TRAKT_SEC })
        });
        if (tokenRes.status === 200) {
          clearInterval(poll);
          const tokenData = await tokenRes.json();
          traktAccessToken = tokenData.access_token;
          traktRefreshToken = tokenData.refresh_token || "";
          localStorage.setItem("trakt_access_token", traktAccessToken);
          localStorage.setItem("trakt_refresh_token", traktRefreshToken);
          updateTraktSettingsUI();
          loadTraktData();
        }
      } catch (_) {}
    }, pollInterval);
  } catch (err) {
    status.innerHTML = `Failed: ${err.message}`;
    connectBtn.style.display = "flex";
  }
}

async function traktFetch(endpoint, options = {}) {
  const res = await fetch(TRAKT_API + endpoint, { ...options, headers: { ...traktHeaders(), ...(options.headers || {}) } });
  if (res.status === 401 && traktRefreshToken) {
    const refreshed = await refreshTraktToken();
    if (refreshed) {
      return fetch(TRAKT_API + endpoint, { ...options, headers: { ...traktHeaders(), ...(options.headers || {}) } });
    }
  }
  return res;
}

async function refreshTraktToken() {
  try {
    const res = await fetch(`${TRAKT_API}/oauth/token`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        refresh_token: traktRefreshToken,
        client_id: TRAKT_CID,
        client_secret: TRAKT_SEC,
        redirect_uri: "urn:ietf:wg:oauth:2.0:oob",
        grant_type: "refresh_token"
      })
    });
    if (res.ok) {
      const data = await res.json();
      traktAccessToken = data.access_token;
      traktRefreshToken = data.refresh_token || traktRefreshToken;
      localStorage.setItem("trakt_access_token", traktAccessToken);
      localStorage.setItem("trakt_refresh_token", traktRefreshToken);
      return true;
    }
  } catch (_) {}
  traktAccessToken = ""; traktRefreshToken = "";
  localStorage.removeItem("trakt_access_token");
  localStorage.removeItem("trakt_refresh_token");
  return false;
}

async function loadTraktData() {
  if (!traktAccessToken) return;
  try {
    const [wm, ws, wlm, wls, playback] = await Promise.all([
      traktFetch("/sync/watched/movies").then(r => r.ok ? r.json() : []),
      traktFetch("/sync/watched/shows").then(r => r.ok ? r.json() : []),
      traktFetch("/users/me/watchlist/movies?sort=added").then(r => r.ok ? r.json() : []),
      traktFetch("/users/me/watchlist/shows?sort=added").then(r => r.ok ? r.json() : []),
      traktFetch("/sync/playback").then(r => r.ok ? r.json() : [])
    ]);
    traktWatchedSet.clear();
    traktWatchlistSet.clear();
    wm.forEach(i => { if (i.movie?.ids?.imdb) traktWatchedSet.add(i.movie.ids.imdb); });
    ws.forEach(i => { if (i.show?.ids?.imdb) traktWatchedSet.add(i.show.ids.imdb); });
    wlm.forEach(i => { if (i.movie?.ids?.imdb) traktWatchlistSet.add(i.movie.ids.imdb); });
    wls.forEach(i => { if (i.show?.ids?.imdb) traktWatchlistSet.add(i.show.ids.imdb); });

    const grid = document.getElementById("catalogRows");
    if (grid) {
      await loadContinueWatchingRow(grid, ws, playback);
      await loadTraktWatchlistRow(grid, [...wlm, ...wls]);
    }
  } catch (e) { console.warn("Trakt sync:", e); }
}

async function loadContinueWatchingRow(grid, watchedShows, playback) {
  const items = [];
  const seen = new Set();

  const recentShows = [...watchedShows]
    .sort((a, b) => new Date(b.last_watched_at) - new Date(a.last_watched_at))
    .slice(0, 20);

  const progressResults = await Promise.allSettled(
    recentShows.map(s =>
      traktFetch(`/shows/${s.show.ids.trakt}/progress/watched`)
        .then(r => r.ok ? r.json() : null)
        .then(prog => ({ show: s, progress: prog }))
    )
  );

  for (const result of progressResults) {
    if (result.status !== "fulfilled" || !result.value.progress) continue;
    const { show: s, progress: prog } = result.value;
    if (prog.completed >= prog.aired || !prog.next_episode) continue;
    const tmdbId = s.show.ids?.tmdb;
    if (!tmdbId || seen.has(tmdbId)) continue;
    seen.add(tmdbId);
    const pct = prog.aired > 0 ? Math.round((prog.completed / prog.aired) * 100) : 0;
    items.push({
      tmdbId, type: "tv", pct,
      epLabel: `S${prog.next_episode.season} E${prog.next_episode.number}`,
      nextSeason: prog.next_episode.season,
      nextEpisode: prog.next_episode.number,
      sortDate: new Date(s.last_watched_at)
    });
  }

  for (const p of playback) {
    if (p.type === "movie" && p.movie) {
      const tmdbId = p.movie.ids?.tmdb;
      if (!tmdbId || seen.has("m" + tmdbId)) continue;
      seen.add("m" + tmdbId);
      items.push({
        tmdbId, type: "movie", pct: Math.round(p.progress),
        epLabel: null, sortDate: new Date(p.paused_at)
      });
    }
    if (p.type === "episode" && p.show) {
      const tmdbId = p.show.ids?.tmdb;
      if (!tmdbId || seen.has(tmdbId)) continue;
      seen.add(tmdbId);
      items.push({
        tmdbId, type: "tv", pct: Math.round(p.progress),
        epLabel: `S${p.episode.season} E${p.episode.number}`,
        nextSeason: p.episode.season, nextEpisode: p.episode.number,
        sortDate: new Date(p.paused_at)
      });
    }
  }

  items.sort((a, b) => b.sortDate - a.sortDate);
  if (!items.length) return;

  const row = createRowSkeleton("Continue Watching");
  grid.insertBefore(row, grid.firstChild);

  const cards = [];
  for (const item of items.slice(0, 20)) {
    try {
      const mtype = item.type === "movie" ? "movie" : "tv";
      const d = await tmdbFetch(`/${mtype}/${item.tmdbId}`);

      let thumbUrl = "";
      if (mtype === "tv" && item.nextSeason && item.nextEpisode) {
        try {
          const ep = await tmdbFetch(`/tv/${item.tmdbId}/season/${item.nextSeason}/episode/${item.nextEpisode}`);
          if (ep.still_path) thumbUrl = `${TMDB_IMG}w500${ep.still_path}`;
        } catch (_) {}
      }
      if (!thumbUrl && d.backdrop_path) thumbUrl = `${TMDB_IMG}w780${d.backdrop_path}`;
      if (!thumbUrl && d.poster_path) thumbUrl = `${TMDB_IMG}w342${d.poster_path}`;

      const title = d.title || d.name;
      const card = document.createElement("div");
      card.className = "cw-card";
      card.innerHTML = `
        <div style="position:relative">
          <img class="cw-thumb" src="${thumbUrl}" alt="${esc(title)}" loading="lazy">
          <div class="cw-play-icon"><svg viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21"/></svg></div>
        </div>
        <div class="cw-info">
          <div class="cw-title">${esc(title)}</div>
          <div class="cw-sub">
            ${item.epLabel ? `<span class="cw-ep">${item.epLabel}</span>` : ""}
            <span>${mtype === "tv" ? "TV" : "Film"}</span>
          </div>
        </div>
        <div class="cw-progress"><div class="cw-progress-bar" style="width:${item.pct}%"></div></div>`;

      card.addEventListener("click", () => openModal({
        id: d.id,
        title,
        posterPath: d.poster_path,
        backdropPath: d.backdrop_path,
        rating: d.vote_average,
        releaseDate: d.release_date || d.first_air_date,
        mediaType: mtype,
        genreIds: (d.genres || []).map(g => g.id),
        originalLanguage: d.original_language || "",
        resumeSeason: item.nextSeason || null,
        resumeEpisode: item.nextEpisode || null
      }));
      cards.push(card);
    } catch (_) {}
  }

  const scrollArea = document.createElement("div");
  scrollArea.className = "row-scroll";
  cards.forEach(c => scrollArea.appendChild(c));
  row.querySelector(".row-loading")?.remove();
  row.appendChild(scrollArea);
}

async function loadTraktWatchlistRow(grid, watchlistItems) {
  if (!watchlistItems.length) return;

  const row = createRowSkeleton("My Trakt Watchlist");
  grid.insertBefore(row, grid.children[1] || null);

  const cards = [];
  const batch = watchlistItems.slice(0, 20);
  for (const entry of batch) {
    const obj = entry.movie || entry.show;
    const mtype = entry.movie ? "movie" : "tv";
    const tmdbId = obj?.ids?.tmdb;
    if (!tmdbId) continue;
    try {
      const d = await tmdbFetch(`/${mtype}/${tmdbId}`);
      cards.push(createCard({
        id: d.id,
        title: d.title || d.name,
        posterPath: d.poster_path,
        backdropPath: d.backdrop_path,
        rating: d.vote_average,
        releaseDate: d.release_date || d.first_air_date,
        mediaType: mtype,
        genreIds: (d.genres || []).map(g => g.id)
      }));
    } catch (_) {}
  }

  const scrollArea = document.createElement("div");
  scrollArea.className = "row-scroll";
  cards.forEach(c => scrollArea.appendChild(c));
  row.querySelector(".row-loading")?.remove();
  row.appendChild(scrollArea);
}

function updateTraktButtons() {
  if (!traktAccessToken) return;
  const wlBtn = document.getElementById("btnTraktWatchlist");
  const whBtn = document.getElementById("btnTraktWatched");
  if (currentImdbId && traktWatchlistSet.has(currentImdbId)) {
    wlBtn.classList.add("active");
  } else {
    wlBtn.classList.remove("active");
  }
  if (currentImdbId && traktWatchedSet.has(currentImdbId)) {
    whBtn.classList.add("active");
  } else {
    whBtn.classList.remove("active");
  }
}

async function toggleTraktWatchlist() {
  if (!traktAccessToken || !currentItem || !currentImdbId) return;
  const btn = document.getElementById("btnTraktWatchlist");
  const isActive = btn.classList.contains("active");
  const type = currentItem.mediaType === "tv" ? "shows" : "movies";
  const body = { [type]: [{ ids: { imdb: currentImdbId } }] };

  try {
    if (isActive) {
      await traktFetch("/sync/watchlist/remove", { method: "POST", body: JSON.stringify(body) });
      btn.classList.remove("active");
      traktWatchlistSet.delete(currentImdbId);
    } else {
      await traktFetch("/sync/watchlist", { method: "POST", body: JSON.stringify(body) });
      btn.classList.add("active");
      traktWatchlistSet.add(currentImdbId);
    }
  } catch (_) {}
}

async function toggleTraktWatched() {
  if (!traktAccessToken || !currentItem || !currentImdbId) return;
  const btn = document.getElementById("btnTraktWatched");
  const isActive = btn.classList.contains("active");
  const type = currentItem.mediaType === "tv" ? "shows" : "movies";
  const body = { [type]: [{ ids: { imdb: currentImdbId } }] };

  try {
    if (isActive) {
      await traktFetch("/sync/history/remove", { method: "POST", body: JSON.stringify(body) });
      btn.classList.remove("active");
      traktWatchedSet.delete(currentImdbId);
    } else {
      await traktFetch("/sync/history", { method: "POST", body: JSON.stringify(body) });
      btn.classList.add("active");
      traktWatchedSet.add(currentImdbId);
    }
  } catch (_) {}
}

init();
</script>
